<!DOCTYPE html>
<html lang="en-AU">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>Racing NSW — Internal Admin</title>

<!-- ============================================================
     RACING NSW — INTERNAL CONTENT ADMIN
     Internal-only editor for race_days, races, results and
     news_stories in Supabase. Gated behind Supabase Auth
     (email + password). Function over form.

     SETUP
     1. Fill in SUPABASE_URL + SUPABASE_ANON_KEY below.
     2. Create an admin user in the Supabase dashboard
        (Authentication → Users → Add user). There is no
        self-signup here on purpose.
     3. The reference schema only grants PUBLIC READ. To let a
        signed-in editor write, run this once in the SQL editor:

        do $$
        declare t text;
        begin
          foreach t in array array['race_days','races','results','news_stories']
          loop
            execute format(
              'create policy "Authenticated write" on public.%I
                 for all to authenticated using (true) with check (true);', t);
          end loop;
        end $$;

        (results also has a child `runners` table — add it to the
         array above if you later edit runners here.)
     ============================================================ -->

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{ --bg:#0f1523; --panel:#182135; --line:#2a3852; --ink:#e8eefb; --muted:#93a4c4;
         --accent:#5BB8FF; --accent-ink:#06122B; --danger:#e8506b; --ok:#39c07a; }
  *{ box-sizing:border-box; }
  body{ margin:0; font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
        background:var(--bg); color:var(--ink); }
  h1,h2,h3{ margin:0; font-weight:700; }
  a{ color:var(--accent); }
  button{ font:inherit; cursor:pointer; border:0; border-radius:8px; padding:9px 14px; font-weight:600; }
  .btn{ background:var(--accent); color:var(--accent-ink); }
  .btn-ghost{ background:transparent; color:var(--ink); border:1px solid var(--line); }
  .btn-danger{ background:transparent; color:var(--danger); border:1px solid var(--danger); padding:5px 10px; }
  .btn-sm{ padding:5px 10px; font-size:13px; }
  input,select{ font:inherit; width:100%; padding:8px 10px; border-radius:8px;
        border:1px solid var(--line); background:#0d1421; color:var(--ink); }
  input[type=checkbox]{ width:auto; }
  label{ display:block; font-size:12px; color:var(--muted); font-weight:600; }
  label input, label select{ margin-top:4px; }
  label.chk{ display:flex; align-items:center; gap:8px; color:var(--ink); font-size:14px; padding-top:18px; }
  label.chk input{ margin-top:0; }

  /* Layout */
  header{ display:flex; align-items:center; justify-content:space-between;
          padding:12px 20px; border-bottom:1px solid var(--line); background:var(--panel); }
  header .who{ font-size:12px; color:var(--muted); }
  main{ max-width:960px; margin:0 auto; padding:20px; }
  .tabs{ display:flex; gap:6px; flex-wrap:wrap; margin-bottom:18px; }
  .tab{ background:var(--panel); color:var(--muted); border:1px solid var(--line); }
  .tab.on{ background:var(--accent); color:var(--accent-ink); border-color:var(--accent); }

  .card{ background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:16px; margin-bottom:18px; }
  .grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:12px; }
  .grid .full{ grid-column:1 / -1; }
  .form-actions{ display:flex; gap:10px; align-items:center; margin-top:14px; }

  .row{ display:flex; align-items:center; justify-content:space-between; gap:12px;
        padding:10px 12px; border:1px solid var(--line); border-radius:9px; margin-bottom:8px; background:#111a2b; }
  .row .txt{ min-width:0; }
  .row .txt b{ font-weight:700; }
  .row .txt small{ color:var(--muted); }
  .row .ops{ display:flex; gap:8px; flex:none; }

  #status{ padding:9px 12px; border-radius:8px; margin-bottom:14px; display:none; font-weight:600; }
  #status.show{ display:block; }
  #status.ok{ background:rgba(57,192,122,.15); color:var(--ok); border:1px solid rgba(57,192,122,.4); }
  #status.err{ background:rgba(232,80,107,.15); color:var(--danger); border:1px solid rgba(232,80,107,.4); }
  .muted{ color:var(--muted); }
  .banner{ background:#3a2a10; color:#ffd37a; border:1px solid #6b4e17; padding:10px 14px;
           border-radius:8px; margin:16px 20px; font-weight:600; }

  /* Login */
  #login{ max-width:340px; margin:12vh auto; padding:26px; }
  #login h1{ font-size:20px; margin-bottom:4px; }
  #login p{ color:var(--muted); margin:0 0 20px; font-size:13px; }
  #login label{ margin-bottom:12px; }
  #loginErr{ color:var(--danger); font-size:13px; min-height:18px; margin-top:6px; }
  .hidden{ display:none !important; }
</style>
</head>
<body>

<div id="cfgBanner" class="banner hidden">
  ⚠ Supabase is not configured. Set <code>SUPABASE_URL</code> and <code>SUPABASE_ANON_KEY</code> at the top of admin.html.
</div>

<!-- ───────── LOGIN ───────── -->
<section id="login" class="card hidden">
  <h1>Racing NSW Admin</h1>
  <p>Internal content editor. Sign in with your staff account.</p>
  <form id="loginForm">
    <label>Email
      <input type="email" id="email" autocomplete="username" required>
    </label>
    <label>Password
      <input type="password" id="password" autocomplete="current-password" required>
    </label>
    <button class="btn" type="submit" style="width:100%">Sign in</button>
    <div id="loginErr"></div>
  </form>
</section>

<!-- ───────── APP ───────── -->
<div id="app" class="hidden">
  <header>
    <h1 style="font-size:16px">Racing NSW — Content Admin</h1>
    <div style="display:flex; align-items:center; gap:14px">
      <span class="who" id="whoami"></span>
      <button class="btn-ghost btn-sm" id="signout">Sign out</button>
    </div>
  </header>

  <main>
    <div class="tabs" id="tabs"></div>
    <div id="status"></div>

    <div class="card">
      <h2 id="formTitle" style="font-size:15px; margin-bottom:14px">New record</h2>
      <div class="grid" id="formFields"></div>
      <div class="form-actions">
        <button class="btn" id="saveBtn">Save</button>
        <button class="btn-ghost" id="cancelBtn">Clear</button>
        <span class="muted" id="editHint"></span>
      </div>
    </div>

    <div class="card">
      <h2 style="font-size:15px; margin-bottom:14px" id="listTitle">Records</h2>
      <div id="list"><p class="muted">Loading…</p></div>
    </div>
  </main>
</div>

<script>
/* ====== CONFIG — fill these in ====== */
const SUPABASE_URL      = 'https://YOUR-PROJECT-ref.supabase.co';
const SUPABASE_ANON_KEY = 'YOUR-ANON-PUBLIC-KEY';
/* ==================================== */

const CONFIGURED = !/YOUR-PROJECT-ref|YOUR-ANON-PUBLIC-KEY/.test(SUPABASE_URL + SUPABASE_ANON_KEY);
const sb = CONFIGURED ? supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

/* ── Table definitions (columns mirror the Supabase schema) ── */
const SECTORS = ['metro','prov','country'];
const TABLES = {
  race_days: {
    label:'Race Days',
    order:{ column:'race_date', ascending:false },
    fields:[
      { name:'sector',    label:'Sector',      type:'select', options:SECTORS, required:true },
      { name:'venue',     label:'Venue',       type:'text',   required:true },
      { name:'day',       label:'Feature day', type:'text' },
      { name:'race_date', label:'Date',        type:'date',   required:true },
      { name:'badge',     label:'Badge',       type:'text' },
      { name:'condition', label:'Condition',   type:'text' },
    ],
    summary: r => `<b>${esc(r.race_date)} · ${esc(r.venue)}</b>` +
                  `<br><small>${esc(r.day||'—')} · ${esc(r.sector)}${r.badge?' · '+esc(r.badge):''}</small>`,
  },
  races: {
    label:'Races',
    order:{ column:'num', ascending:true },
    fields:[
      { name:'race_day_id', label:'Race day', type:'ref', ref:'race_days', required:true },
      { name:'num',         label:'Race #',   type:'number', required:true },
      { name:'name',        label:'Name',     type:'text',   required:true },
      { name:'cls',         label:'Class',    type:'text' },
      { name:'dist',        label:'Distance', type:'text' },
      { name:'race_time',   label:'Time',     type:'text' },
      { name:'feature',     label:'Feature race', type:'checkbox' },
      { name:'prize',       label:'Prize',    type:'text' },
    ],
    summary: r => `<b>R${esc(r.num)} · ${esc(r.name)}${r.feature?' ⭐':''}</b>` +
                  `<br><small>${esc(refLabel('race_days', r.race_day_id))}${r.dist?' · '+esc(r.dist):''}${r.cls?' · '+esc(r.cls):''}</small>`,
  },
  results: {
    label:'Results',
    order:{ column:'result_date', ascending:false },
    fields:[
      { name:'sector',       label:'Sector',        type:'select', options:SECTORS, required:true },
      { name:'result_date',  label:'Date',          type:'date',   required:true },
      { name:'venue',        label:'Venue',         type:'text',   required:true },
      { name:'race',         label:'Race',          type:'text',   required:true },
      { name:'cls',          label:'Class',         type:'text' },
      { name:'winner',       label:'Winner',        type:'text' },
      { name:'jt',           label:'Jockey / Trainer', type:'text' },
      { name:'div_win',      label:'Win dividend',      type:'text' },
      { name:'div_exacta',   label:'Exacta dividend',   type:'text' },
      { name:'div_trifecta', label:'Trifecta dividend', type:'text' },
    ],
    summary: r => `<b>${esc(r.result_date)} · ${esc(r.race)}</b>` +
                  `<br><small>${esc(r.venue)} · Winner: ${esc(r.winner||'—')}${r.cls?' · '+esc(r.cls):''}</small>`,
  },
  news_stories: {
    label:'News',
    order:{ column:'sort_order', ascending:true, nullsFirst:false },
    fields:[
      { name:'title',           label:'Title',      type:'text', required:true, full:true },
      { name:'tag',             label:'Tag',        type:'text' },
      { name:'published_label', label:'Date label', type:'text' },
      { name:'url',             label:'Link URL',   type:'text', full:true },
      { name:'sort_order',      label:'Sort order', type:'number' },
    ],
    summary: r => `<b>${esc(r.title)}</b>` +
                  `<br><small>${esc(r.tag||'—')}${r.published_label?' · '+esc(r.published_label):''}</small>`,
  },
};

/* ── State ── */
let activeTable = 'race_days';
let editingId = null;
const refCache = {};          // { race_days: [rows] } for ref selects + labels

/* ── Helpers ── */
function esc(v){ return String(v==null?'':v).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function refLabel(table, id){
  const rows = refCache[table] || [];
  const row = rows.find(r => r.id === id);
  if(!row) return '#'+id;
  return (TABLES[table].summary(row).replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim());
}
function status(msg, isErr){
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'show ' + (isErr ? 'err' : 'ok');
  if(!isErr) setTimeout(()=>{ el.className=''; }, 2500);
}

/* ── Auth ── */
async function initAuth(){
  if(!CONFIGURED){ document.getElementById('cfgBanner').classList.remove('hidden'); return; }
  const { data:{ session } } = await sb.auth.getSession();
  route(session);
  sb.auth.onAuthStateChange((_e, s)=> route(s));
}
function route(session){
  const authed = !!session;
  document.getElementById('login').classList.toggle('hidden', authed);
  document.getElementById('app').classList.toggle('hidden', !authed);
  if(authed){
    document.getElementById('whoami').textContent = session.user.email || '';
    buildTabs();
    selectTable(activeTable);
  }
}
document.getElementById('loginForm').addEventListener('submit', async (e)=>{
  e.preventDefault();
  document.getElementById('loginErr').textContent = '';
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const { error } = await sb.auth.signInWithPassword({ email, password });
  if(error) document.getElementById('loginErr').textContent = error.message;
});
document.getElementById('signout').addEventListener('click', ()=> sb.auth.signOut());

/* ── Tabs ── */
function buildTabs(){
  const wrap = document.getElementById('tabs');
  wrap.innerHTML = Object.keys(TABLES).map(t =>
    `<button class="tab" data-t="${t}">${TABLES[t].label}</button>`).join('');
  wrap.querySelectorAll('.tab').forEach(b =>
    b.addEventListener('click', ()=> selectTable(b.dataset.t)));
}
async function selectTable(t){
  activeTable = t;
  editingId = null;
  document.querySelectorAll('.tab').forEach(b => b.classList.toggle('on', b.dataset.t === t));
  document.getElementById('listTitle').textContent = TABLES[t].label;
  // Load any referenced tables first (for ref selects + labels), then this table.
  for(const f of TABLES[t].fields){
    if(f.type === 'ref' && !refCache[f.ref]) await fetchInto(f.ref);
  }
  buildForm();
  loadList();
}

/* ── Form ── */
function buildForm(){
  const cfg = TABLES[activeTable];
  document.getElementById('formTitle').textContent = editingId ? `Edit ${cfg.label} record` : `New ${cfg.label} record`;
  document.getElementById('editHint').textContent = editingId ? `editing #${editingId}` : '';
  document.getElementById('formFields').innerHTML = cfg.fields.map(fieldHtml).join('');
}
function fieldHtml(f){
  const id = 'f_' + f.name;
  const cls = f.full ? ' class="full"' : '';
  if(f.type === 'checkbox')
    return `<label class="chk"><input type="checkbox" id="${id}"> ${f.label}</label>`;
  if(f.type === 'select'){
    const opts = f.options.map(o => `<option value="${o}">${o}</option>`).join('');
    return `<div${cls}><label>${f.label}${f.required?' *':''}<select id="${id}">${opts}</select></label></div>`;
  }
  if(f.type === 'ref'){
    const rows = refCache[f.ref] || [];
    const opts = rows.map(r => `<option value="${r.id}">${esc(refLabel(f.ref, r.id))}</option>`).join('');
    return `<div${cls}><label>${f.label}${f.required?' *':''}<select id="${id}"><option value="">— select —</option>${opts}</select></label></div>`;
  }
  const type = f.type === 'number' ? 'number' : f.type === 'date' ? 'date' : 'text';
  return `<div${cls}><label>${f.label}${f.required?' *':''}<input type="${type}" id="${id}"></label></div>`;
}
function readForm(){
  const obj = {};
  for(const f of TABLES[activeTable].fields){
    const el = document.getElementById('f_' + f.name);
    if(f.type === 'checkbox'){ obj[f.name] = el.checked; continue; }
    let v = el.value;
    if(v === ''){ obj[f.name] = null; continue; }
    if(f.type === 'number' || f.type === 'ref') v = Number(v);
    obj[f.name] = v;
  }
  return obj;
}
function fillForm(row){
  for(const f of TABLES[activeTable].fields){
    const el = document.getElementById('f_' + f.name);
    if(!el) continue;
    if(f.type === 'checkbox') el.checked = !!row[f.name];
    else el.value = row[f.name] == null ? '' : row[f.name];
  }
}
function resetForm(){ editingId = null; buildForm(); }

document.getElementById('saveBtn').addEventListener('click', save);
document.getElementById('cancelBtn').addEventListener('click', resetForm);

async function save(){
  const cfg = TABLES[activeTable];
  const obj = readForm();
  // Required-field check
  const missing = cfg.fields.filter(f => f.required && (obj[f.name] == null || obj[f.name] === ''));
  if(missing.length){ status('Missing required: ' + missing.map(f=>f.label).join(', '), true); return; }

  const q = editingId
    ? sb.from(activeTable).update(obj).eq('id', editingId).select()
    : sb.from(activeTable).insert(obj).select();
  const { error } = await q;
  if(error){ status(error.message, true); return; }
  status(editingId ? 'Updated.' : 'Added.');
  refCache[activeTable] = null;          // invalidate so ref selects refresh
  resetForm();
  loadList();
}

/* ── List / fetch ── */
async function fetchInto(table){
  const cfg = TABLES[table];
  const { data, error } = await sb.from(table).select('*')
    .order(cfg.order.column, { ascending: cfg.order.ascending, nullsFirst: cfg.order.nullsFirst });
  if(error){ status(error.message, true); refCache[table] = []; return []; }
  refCache[table] = data;
  return data;
}
async function loadList(){
  const listEl = document.getElementById('list');
  listEl.innerHTML = '<p class="muted">Loading…</p>';
  const cfg = TABLES[activeTable];
  const data = await fetchInto(activeTable);
  if(!data.length){ listEl.innerHTML = '<p class="muted">No records yet.</p>'; return; }
  listEl.innerHTML = data.map(r => `
    <div class="row">
      <div class="txt">${cfg.summary(r)}</div>
      <div class="ops">
        <button class="btn-ghost btn-sm" data-edit="${r.id}">Edit</button>
        <button class="btn-danger btn-sm" data-del="${r.id}">Delete</button>
      </div>
    </div>`).join('');
  listEl.querySelectorAll('[data-edit]').forEach(b =>
    b.addEventListener('click', ()=> startEdit(Number(b.dataset.edit))));
  listEl.querySelectorAll('[data-del]').forEach(b =>
    b.addEventListener('click', ()=> del(Number(b.dataset.del))));
}
function startEdit(id){
  const row = (refCache[activeTable] || []).find(r => r.id === id);
  if(!row) return;
  editingId = id;
  buildForm();
  fillForm(row);
  window.scrollTo({ top:0, behavior:'smooth' });
}
async function del(id){
  if(!confirm('Delete this record? This cannot be undone.')) return;
  const { error } = await sb.from(activeTable).delete().eq('id', id);
  if(error){ status(error.message, true); return; }
  status('Deleted.');
  refCache[activeTable] = null;
  if(editingId === id) resetForm();
  loadList();
}

/* ── Boot ── */
initAuth();
</script>
</body>
</html>
